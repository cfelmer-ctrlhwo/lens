# Lens CI — macOS build, test, and type-check
#
# Purpose: validate every push to main and every pull request by compiling the
#   Rust backend (src-tauri), running the cargo test suite, and type-checking
#   the React/TypeScript frontend.
# Process: triggered by push to main or any pull_request event. Runs on
#   macos-14 (Apple Silicon, matching Lens's macOS-only target). Caches
#   ~/.cargo, src-tauri/target keyed on Cargo.lock, and ~/.bun/install/cache
#   keyed on bun.lock to keep runs under ~5 min after warm-up.
# Connections: Cargo.lock + bun.lock drive cache keys. Reads src-tauri/ and
#   src/ source. CODEOWNERS gates any changes to this file.
#
# Security notes (per /cso):
#   - All third-party actions are pinned to full 40-char commit SHAs (not tags).
#   - Uses the safer `pull_request` trigger, NOT `pull_request_target` (which
#     would expose secrets to fork PRs).
#   - Workflow declares no secrets, no write permissions beyond default read.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default to read-only token. Individual jobs may opt in if they need writes.
permissions:
  contents: read

# Avoid stacking redundant runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build, test, type-check (macOS)
    runs-on: macos-14
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: short
      # Tauri build deps occasionally hit incremental-compile bugs; keep off in CI.
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust toolchain (stable)
        # dtolnay/rust-toolchain@stable (resolved 2026-05-14)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo registry and build output
        # actions/cache@v5.0.5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install bun
        # oven-sh/setup-bun@v2.2.0
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.13"

      - name: Cache bun install dir
        # actions/cache@v5.0.5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Cargo build (compile check)
        working-directory: src-tauri
        run: cargo build --locked --all-targets

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --locked

      - name: Frontend type-check
        run: bun run tsc --noEmit

      - name: Cargo clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets -- -D warnings
