# Lens pricing.yaml — token-cost lookup table per (provider, model)
#
# Purpose: Maps (provider, model) to per-token cost so adapters can estimate
#   cost_usd_estimated from token counts in session logs.
# Process: Adapters call `PricingTable::lookup_cost(provider, model, tokens_in, tokens_out)`.
#   Cost = (tokens_in * input_per_million / 1_000_000) + (tokens_out * output_per_million / 1_000_000).
#   Lens UI displays a warning banner when last_updated is more than 30 days stale.
# Connections: Read by src/cost/pricing.rs. Updated manually via PR. Community PRs welcome.
#   No automated price scraping in V1.
#
# IMPORTANT: Prices below are PLACEHOLDERS to enable the cost-calculation code path during
# Week 1 development. Verify against vendor pricing pages before relying for real numbers:
#   Anthropic: https://www.anthropic.com/pricing
#   OpenAI:    https://openai.com/api/pricing
#   xAI:       https://x.ai/api

schema_version: 0.1.0
last_updated: 2026-05-14
maintenance: manual; no automated scraping in V1

models:

  # Anthropic
  - provider: anthropic
    model: claude-opus-4-7
    input_per_million_usd: 15.00
    output_per_million_usd: 75.00

  - provider: anthropic
    model: claude-opus-4-6
    input_per_million_usd: 15.00
    output_per_million_usd: 75.00

  - provider: anthropic
    model: claude-sonnet-4-6
    input_per_million_usd: 3.00
    output_per_million_usd: 15.00

  - provider: anthropic
    model: claude-haiku-4-5
    input_per_million_usd: 0.80
    output_per_million_usd: 4.00

  # OpenAI
  - provider: openai
    model: gpt-5.4
    input_per_million_usd: 1.25
    output_per_million_usd: 10.00

  - provider: openai
    model: gpt-5.5
    input_per_million_usd: 2.00
    output_per_million_usd: 15.00

  # xAI
  - provider: xai
    model: grok-3.5
    input_per_million_usd: 3.00
    output_per_million_usd: 15.00

  # Google
  - provider: google
    model: gemini-2-5-pro
    input_per_million_usd: 1.25
    output_per_million_usd: 5.00

  - provider: google
    model: gemini-nano-on-device
    input_per_million_usd: 0.00
    output_per_million_usd: 0.00

  # Local models — always zero
  - provider: local
    model: "*"
    input_per_million_usd: 0.00
    output_per_million_usd: 0.00

# Fallback for unknown (provider, model) tuples: cost is omitted from the event
# and adapter sets cost_source: "none". UI may show "—" rather than $0.00 in
# this case to distinguish "unknown" from "actually free."
